apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: overengineered-todo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: notification-service
          image: overengineered-todo/notification-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: MAILHOG_SMTP_HOST
              value: "mailhog"
            - name: MAILHOG_SMTP_PORT
              value: "1025"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: overengineered-todo
spec:
  selector:
    app: notification-service
  ports:
    - port: 3003
      targetPort: 3003
