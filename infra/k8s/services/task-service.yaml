apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: overengineered-todo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: task-service
          image: overengineered-todo/task-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: POSTGRES_URL
              value: "postgresql://todo:todo@postgres:5432/todo"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: overengineered-todo
spec:
  selector:
    app: task-service
  ports:
    - port: 3001
      targetPort: 3001
