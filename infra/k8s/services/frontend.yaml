apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: overengineered-todo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: overengineered-todo/frontend:latest
          ports:
            - containerPort: 4000
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: overengineered-todo
spec:
  selector:
    app: frontend
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30000
  type: NodePort
