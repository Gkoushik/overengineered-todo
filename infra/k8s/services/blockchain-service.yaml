apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-service
  namespace: overengineered-todo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: blockchain-service
  template:
    metadata:
      labels:
        app: blockchain-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3007"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: blockchain-service
          image: overengineered-todo/blockchain-service:latest
          ports:
            - containerPort: 3007
          env:
            - name: PORT
              value: "3007"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: HARDHAT_RPC_URL
              value: "http://hardhat:8545"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: blockchain-service
  namespace: overengineered-todo
spec:
  selector:
    app: blockchain-service
  ports:
    - port: 3007
      targetPort: 3007
