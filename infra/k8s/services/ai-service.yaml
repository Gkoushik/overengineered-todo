apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: overengineered-todo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3004"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ai-service
          image: overengineered-todo/ai-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: claude-api-key
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: overengineered-todo
spec:
  selector:
    app: ai-service
  ports:
    - port: 3004
      targetPort: 3004
