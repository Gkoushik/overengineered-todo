apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: overengineered-todo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3006"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: analytics-service
          image: overengineered-todo/analytics-service:latest
          ports:
            - containerPort: 3006
          env:
            - name: PORT
              value: "3006"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: TIMESCALE_URL
              value: "postgresql://todo:todo@timescaledb:5432/analytics"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: overengineered-todo
spec:
  selector:
    app: analytics-service
  ports:
    - port: 3006
      targetPort: 3006
