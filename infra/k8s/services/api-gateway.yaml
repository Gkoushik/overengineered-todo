apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: overengineered-todo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: overengineered-todo/api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3002"
            - name: TASK_SERVICE_URL
              value: "http://task-service:3001"
            - name: AI_SERVICE_URL
              value: "http://ai-service:3004"
            - name: SEARCH_SERVICE_URL
              value: "http://search-service:3005"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service:3006"
            - name: BLOCKCHAIN_SERVICE_URL
              value: "http://blockchain-service:3007"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: overengineered-todo
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
  type: NodePort
