apiVersion: apps/v1
kind: Deployment
metadata:
  name: hardhat
  namespace: overengineered-todo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hardhat
  template:
    metadata:
      labels:
        app: hardhat
    spec:
      containers:
        - name: hardhat
          image: overengineered-todo/hardhat:latest
          ports:
            - containerPort: 8545
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8545
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hardhat
  namespace: overengineered-todo
spec:
  selector:
    app: hardhat
  ports:
    - port: 8545
      targetPort: 8545
