global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']

  - job_name: 'task-service'
    static_configs:
      - targets: ['task-service:3001']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3002']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:3003']

  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:3004']

  - job_name: 'search-service'
    static_configs:
      - targets: ['search-service:3005']

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:3006']

  - job_name: 'blockchain-service'
    static_configs:
      - targets: ['blockchain-service:3007']
